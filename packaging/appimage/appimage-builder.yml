version: 1
AppDir:
  path: ./AppDir
  app_info:
    id: org.local76.rwifi
    name: rwifi
    icon: rwifi
    version: TEMPLATE_VERSION
    exec: usr/bin/rwifi
  apt:
    arch: amd64
    sources:
      - sourceline: 'deb http://archive.ubuntu.com/ubuntu/ focal main universe'
    include:
      - libc6
      - libgcc-s1
  files:
    include: []
    exclude: []

AppImage:
  update-information: 'none'
  sign-key: 'none'
  arch: x86_64
