[package]
name = "rwif"
version = "2.5.3"
edition = "2024"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
winreg = "0.56.0"
sysinfo = "0.30"
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_NetworkManagement_WiFi",
    "Win32_NetworkManagement_Ndis",
    "Win32_System_EventLog",
    "Win32_System_Console",
    "Win32_System_Power",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_HiDpi",
] }
qrcodegen = "1.8.0"
windows = { version = "0.52.0", features = [
    "Data_Xml_Dom",
    "UI_Notifications",
] }
rcommon = { git = "https://github.com/tourian-dynamics/rCommon.git", branch = "main" }

[build-dependencies]
winres = "0.1"

# To build locally before pushing rCommon to GitHub, uncomment:
# [patch."https://github.com/tourian-dynamics/rCommon.git"]
# rcommon = { path = "../rCommon" }

